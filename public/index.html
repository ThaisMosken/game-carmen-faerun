<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onde em Faerûn está o Criminoso?</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#121212;color:#e0e0e0;font-size:14px;line-height:1.5}
.screen{display:none;padding:16px;flex-direction:column;gap:12px;max-width:600px;margin:0 auto}
.screen.active{display:flex}
h1{font-size:22px;font-weight:600;color:#fff;text-align:center;margin-bottom:10px}
.card{background:#1e1e1e;border:1px solid #333;border-radius:12px;padding:14px}
.btn{background:#333;border:1px solid #444;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;color:#fff}
.btn.primary{background:#2563eb;color:#fff;border-color:transparent}
.npc-bubble{background:#252525;border:1px solid #333;border-radius:12px 12px 12px 2px;padding:12px;font-size:13px;font-style:italic;color:#ccc;margin-top:8px}
.clue-item{padding:12px;border:1px solid #333;border-radius:8px;background:#1e1e1e;margin-bottom:8px}
.tabs{display:flex;gap:8px;margin-bottom:12px;border-bottom:1px solid #333;padding-bottom:8px}
.tab {
  padding: 8px 16px;
  cursor: pointer;
  border-radius: 8px;
  color: #888;
  font-size: 14px;
  font-weight: bold;
  background: transparent;
  border: 2px solid transparent; 
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  gap: 6px;
}

.tab.active {
  background: #252525;
  color: #fbbf24;
  border: 2px solid #fbbf24;
}

.tab:not(.active):hover {
  color: #fbbf24;
  background: #1e1e1e;
}
input{background:#252525;border:1px solid #444;color:#fff;padding:10px;border-radius:8px;width:100%}
.loading-pulse{animation:pulse 1.5s infinite; color: #777;}
@keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
</style>
</head>
<body>

<div id="setup-screen" class="screen active">
  <h1>🗺️ Caçada em Faerûn</h1>
  <button class="btn primary" style="width:100%; font-weight: bold; font-size: 14px;" onclick="startGame()">
    ▶ Iniciar Missão
  </button>
</div>

<div id="game-screen" class="screen">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div><h2 id="current-city-name">—</h2></div>
    <div style="text-align:right">
      <div id="time-display" style="font-size:12px;color:#aaa"></div>
      <div style="background:#333;border-radius:6px;height:8px;width:100px;overflow:hidden"><div id="time-fill" style="height:100%;background:#16a34a"></div></div>
    </div>
  </div>

  <div class="card" style="text-align:center">
    <div id="warrant-display" style="font-weight:600;color:#eab308;font-size:16px;margin-bottom:8px">Nenhum Mandado</div>
    <button class="btn" onclick="openWarrantModal()">Emitir Mandado</button>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-investigate" onclick="switchTab('investigate', this)">🔍 Investigar</div>
    <div class="tab" id="tab-travel" onclick="switchTab('travel', this)">🌀 Teleportar</div>
    <div class="tab" id="tab-notes" onclick="switchTab('notes', this)">📜 Pistas</div>
  </div>

  <div id="panel-investigate"><div id="venues-list"></div></div>
  <div id="panel-travel" style="display:none"><div id="travel-list"></div></div>
  <div id="panel-notes" style="display:none"><div class="card" id="clues-collected"></div></div>
</div>

<div id="result-screen" class="screen" style="text-align:center">
  <h1 id="result-title"></h1>
  <div class="card" id="result-details" style="margin:20px 0;text-align:center"></div>
  <button class="btn primary" style="width:100%" onclick="location.reload()">Nova Partida</button>
</div>

<div id="warrant-modal" class="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100; align-items:center; justify-content:center;">
  <div class="modal" style="background:#1e1e1e; padding:20px; border-radius:16px; width:90%; max-width:400px;">
    <h3>Emitir Mandado</h3>
    <div id="warrant-options" style="margin:15px 0;max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:8px"></div>
    <button class="btn" style="width:100%" onclick="closeWarrantModal()">Fechar</button>
  </div>
</div>

<script>
const URLS = {
  start: 'https://start-game-hmod4ptaqq-uc.a.run.app',
  investigate: 'https://investigate-hmod4ptaqq-uc.a.run.app',
  travel: 'https://travel-hmod4ptaqq-uc.a.run.app',
  arrest: 'https://arrest-hmod4ptaqq-uc.a.run.app'
};

const HOURS_COST_INVESTIGATING = 2;
const HOURS_COST_TRAVELLING = 8;

const CITIES_CATALOG = {"berdusk": "Berdusk", "bryn_shander": "Bryn Shander", "citadel_adbar": "Citadel Adbar", "citadel_felbarr": "Citadel Felbarr", "daggerford": "Daggerford", "elturel": "Elturel", "everlund": "Everlund", "gauntlgrym": "Gauntlgrym", "goldenfields": "Goldenfields", "iriaebor": "Iriaebor", "longsaddle": "Longsaddle", "loudwater": "Loudwater", "luskan": "Luskan", "menzoberranzan": "Menzoberranzan", "mirabar": "Mirabar", "mithral_hall": "Mithral Hall", "neverwinter": "Neverwinter", "newfort": "Newfort", "phandalin": "Phandalin", "porto_nyanzaru": "Porto Nyanzaru", "scornubel": "Scornubel", "silverymoon": "Silverymoon", "sundabar": "Sundabar", "triboar": "Triboar", "waterdeep": "Waterdeep", "yartar": "Yartar"};
const VENUES_CATALOG = {"biblioteca": {name: "Biblioteca", icon: "📚"}, "cartografo": {name: "Cartógrafo", icon: "📜"}, "centro_cultural": {name: "Centro Cultural", icon: "🎭"}, "estalagem": {name: "Estalagem", icon: "🛌"}, "estaleiro": {name: "Estaleiro", icon: "🏗️"}, "museu": {name: "Museu", icon: "🏛️"}, "oficina_gemas": {name: "Oficina de Gemas", icon: "💎"}, "patio_carrocas": {name: "Pátio de Carroças", icon: "🐪"}, "patio_treinamento": {name: "Pátio de Treinamento", icon: "⚔️"}, "santuario": {name: "Santuário", icon: "🕯️"}, "taverna": {name: "Taverna", icon: "🍺"}, "torre_alta_magia": {name: "Torre de Alta Magia", icon: "🔮"}};
const CRIMINALS_CATALOG = [{id:'anniken_zonledre', name:'Anniken Zonledre'}, {id:'chuck_brinn', name:'Chuck Brinn'}, {id:'coral_meery', name:'Coral Meery'}, {id:'deaf_tidbes', name:'Deaf Tidbes'}, {id:'garlon_scryat', name:'Garlon Scryat'}, {id:'hovio_richithor', name:'Hovio Richithor'}, {id:'kelden_blur', name:'Kelden Blur'}, {id:'marcin_gesedano', name:'Marcin Gesedano'}, {id:'romani_brookebeth_kadio', name:'Romani Brookebeth Kadio'}, {id:'taylana_gaddahyal', name:'Taylana Gaddahyal'}];

let G = {
  sessionId: null, currentCityId: '', currentDay: 1, maxDays: 7, currentMinutes: 8*60,
  venuesInCity: [], visitedVenues: {}, warrant: null, clues: [], history: [], isRequesting: false
};

async function startGame() {
  if (G.isRequesting) return; G.isRequesting = true;
  try {
    const res = await fetch(URLS.start);
    if (!res.ok) {
            const errorData = await res.json();
            const message = errorData.error || "Erro desconhecido no servidor.";            
            console.error("Erro detalhado:", message);
            alert(`Falha ao iniciar: ${message}`);
            return;
        }
        const data = await res.json();
    if (data.error) throw new Error(data.error);

    G.sessionId = data.sessionId;
    G.currentCityId = data.firstCityId;
    G.venuesInCity = data.venues;
    G.history = [data.firstCityId];
    
    document.getElementById('setup-screen').classList.remove('active');
    document.getElementById('game-screen').classList.add('active');
    renderGameScreen();
  } catch (e) { alert("Falha ao conectar."); } finally { G.isRequesting = false; }
}

async function investigateVenue(venueId) {
  if (G.isRequesting) return; 
  if (!advanceTime(HOURS_COST_INVESTIGATING * 60)) return;
  G.isRequesting = true;

  try {
    const res = await fetch(URLS.investigate, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: G.sessionId, venueId: venueId })
    });
    if (!res.ok) {
            const errorData = await res.json();
            const message = errorData.error || "Erro desconhecido no servidor.";            
            console.error("Erro detalhado:", message);
            alert(`Falha ao iniciar: ${message}`);
            return;
        }
    const data = await res.json();
    
    G.visitedVenues[`${G.currentCityId}_${venueId}`] = data.clue;
    G.clues.push(`<strong>[Investigação]</strong> ${CITIES_CATALOG[G.currentCityId]}: ${data.clue}`);
    renderGameScreen();
  } catch (e) { alert("Erro na investigação."); } finally { G.isRequesting = false; }
}

async function travelTo(targetCityId) {
  if (G.isRequesting) return;
  if (!advanceTime(HOURS_COST_TRAVELLING * 60)) return;
  G.isRequesting = true;

  try {
    const res = await fetch(URLS.travel, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: G.sessionId, targetCityId: targetCityId })
    });
    if (!res.ok) {
            const errorData = await res.json();
            const message = errorData.error || "Erro desconhecido no servidor.";            
            console.error("Erro detalhado:", message);
            alert(`Falha ao iniciar: ${message}`);
            return;
        }
    const data = await res.json();

    G.history.push(targetCityId);
    G.currentCityId = data.cityId;
    G.venuesInCity = data.venues;
    
    G.clues.push(`<strong>[Teleporte]</strong> Chegada em ${CITIES_CATALOG[targetCityId]} (Dia ${G.currentDay})`);
    renderGameScreen();
    switchTab('investigate', document.getElementById('tab-investigate'));
  } catch (e) { alert("Erro no teleporte."); } finally { G.isRequesting = false; }
}

async function issueArrest() {
  if (!G.warrant || G.isRequesting) return;
  G.isRequesting = true;
  try {
    const res = await fetch(URLS.arrest, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: G.sessionId, warrantId: G.warrant })
    });
    if (!res.ok) {
            const errorData = await res.json();
            const message = errorData.error || "Erro desconhecido no servidor.";            
            console.error("Erro detalhado:", message);
            alert(`Falha ao iniciar: ${message}`);
            return;
        }
    const data = await res.json();
    endGame(data.status);
  } catch (e) { alert("Erro ao contatar guarnição."); } finally { G.isRequesting = false; }
}

function renderGameScreen() {
  document.getElementById('current-city-name').innerHTML = `Você está em <span style="color: #fbbf24;">${CITIES_CATALOG[G.currentCityId]}</span>`;
  document.getElementById('time-display').textContent = `Dia ${G.currentDay} - ${Math.floor(G.currentMinutes/60)}:00`;
  document.getElementById('time-fill').style.width = `${(1 - (G.currentDay/G.maxDays)) * 100}%`;
  
  const vList = document.getElementById('venues-list');
  vList.innerHTML = G.venuesInCity.map(vid => {
    const v = VENUES_CATALOG[vid];
    const answer = G.visitedVenues[`${G.currentCityId}_${vid}`];
    return `<div class="clue-item">
      <div onclick="${answer ? '' : `investigateVenue('${vid}')`}" style="cursor:pointer;">
        ${v.icon} <strong>${v.name}</strong> ${answer ? '✅' : ''}
      </div>
      ${answer ? `<div class="npc-bubble">${answer}</div>` : ''}
    </div>`;
  }).join('');

  const allIds = Object.keys(CITIES_CATALOG).filter(id => id !== G.currentCityId);
  const options = allIds.sort(() => Math.random() - 0.5).slice(0, 5);
  document.getElementById('travel-list').innerHTML = options.map(id => 
    `<div style="background:#1e1e1e; border: 1px solid #333; padding:12px; margin-bottom:8px; cursor:pointer;" onclick="travelTo('${id}')">🏙️ ${CITIES_CATALOG[id]}</div>`
  ).join('');
}

function advanceTime(m) { 
  G.currentMinutes += m; 
  while (G.currentMinutes > 23 * 60) { G.currentDay++; G.currentMinutes = (8 * 60) + (G.currentMinutes - 23 * 60); }
  if (G.currentDay > G.maxDays) { endGame('timeout'); return false; }
  return true;
}

function switchTab(t, el) {
  ['investigate','travel','notes'].forEach(p => document.getElementById('panel-'+p).style.display = p === t ? 'block' : 'none');
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  if (el) el.classList.add('active');
  if (t === 'notes') document.getElementById('clues-collected').innerHTML = G.clues.join('<br><br>') || "Sem pistas.";
}

function openWarrantModal() {
  document.getElementById('warrant-options').innerHTML = CRIMINALS_CATALOG.map(c => 
    `<div style="padding:8px; background:#333; cursor:pointer" onclick="issueWarrant('${c.id}', '${c.name}')">👤 ${c.name}</div>`
  ).join('');
  document.getElementById('warrant-modal').style.display = 'flex';
}
function closeWarrantModal() { document.getElementById('warrant-modal').style.display = 'none'; }
function issueWarrant(id, name) { 
  G.warrant = id; 
  document.getElementById('warrant-display').innerHTML = `<span style="color: #fbbf24;">${name}</span> <button onclick="issueArrest()" class="btn primary" style="padding:4px 8px; margin-left:8px;">Prender Agora</button>`; 
  closeWarrantModal(); 
}

function endGame(r) {
  document.getElementById('game-screen').classList.remove('active');
  document.getElementById('result-screen').classList.add('active');
  document.getElementById('result-title').textContent = r === 'won' ? "Capturado!" : "Escapou!";
  document.getElementById('result-details').innerHTML = r === 'won' ? "Missão cumprida." : (r === 'timeout' ? "Tempo esgotado." : "Suspeito errado.");
}
</script>
</body>
</html>
