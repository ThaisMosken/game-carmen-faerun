<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carmen Sandiego: Faerûn Edition v17</title>
<style>
/* Estilos visuais mantidos */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#121212;color:#e0e0e0;font-size:14px;line-height:1.5}
.screen{display:none;padding:16px;flex-direction:column;gap:12px;max-width:600px;margin:0 auto}
.screen.active{display:flex}
h1{font-size:22px;font-weight:600;color:#fff;text-align:center;margin-bottom:10px}
.card{background:#1e1e1e;border:1px solid #333;border-radius:12px;padding:14px}
.btn{background:#333;border:1px solid #444;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;color:#fff}
.btn.primary{background:#2563eb;color:#fff;border-color:transparent}
.npc-bubble{background:#252525;border:1px solid #333;border-radius:12px 12px 12px 2px;padding:12px;font-size:13px;font-style:italic;color:#ccc;margin-top:8px}
.clue-item{padding:12px;border:1px solid #333;border-radius:8px;background:#1e1e1e;margin-bottom:8px}
.tabs{display:flex;gap:8px;margin-bottom:12px;border-bottom:1px solid #333;padding-bottom:8px}
.tab{padding:6px 12px;cursor:pointer;border-radius:6px;color:#999}
.tab.active{background:#2563eb;color:#fff}
input{background:#252525;border:1px solid #444;color:#fff;padding:10px;border-radius:8px;width:100%}
.loading-pulse{animation:pulse 1.5s infinite; color: #777;}
@keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
</style>
</head>
<body>

<div id="setup-screen" class="screen active">
  <h1>🗺️ Carmen Sandiego: Faerûn</h1>
  <button class="btn primary" style="width:100%" onclick="startGame()">▶ Iniciar Missão</button>
</div>

<div id="game-screen" class="screen">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div><h2 id="current-city-name">—</h2><div id="city-tags"></div></div>
    <div style="text-align:right">
      <div id="time-display" style="font-size:12px;color:#aaa"></div>
      <div style="background:#333;border-radius:6px;height:8px;width:100px;overflow:hidden"><div id="time-fill" style="height:100%;background:#16a34a"></div></div>
    </div>
  </div>

  <div class="card" style="text-align:center">
    <div id="warrant-display" style="font-weight:600;color:#eab308;font-size:16px;margin-bottom:8px">Nenhum Mandado</div>
    <button class="btn" onclick="openWarrantModal()">Emitir Mandado</button>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-investigate" onclick="switchTab('investigate', this)">🔍 Investigar</div>
    <div class="tab" id="tab-travel" onclick="switchTab('travel', this)">🌀 Teleportar</div>
    <div class="tab" id="tab-notes" onclick="switchTab('notes', this)">📋 Notas</div>
  </div>

  <div id="panel-investigate"><div id="venues-list"></div></div>
  <div id="panel-travel" style="display:none">
    <div id="travel-instructions" style="margin-bottom:12px; font-size:12px; color:#aaa; line-height:1.4"></div>
    <div id="travel-list"></div>
  </div>
  <div id="panel-notes" style="display:none"><div class="card" id="clues-collected"></div></div>

  <div style="margin-top:16px;border:1px dashed #b91c1c;border-radius:8px;background:rgba(185,28,28,0.05)">
    <div onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'" style="padding:8px;cursor:pointer;color:#ef4444;font-size:11px;font-weight:bold">🛡️ PAINEL DO MESTRE ▼</div>
    <div style="display:none;padding:12px;font-size:12px;color:#aaa">
      <div style="margin-bottom:4px">Criminoso: <strong id="dm-criminal" style="color:#ef4444">—</strong></div>
      <div style="margin-bottom:4px">Trilha completa: <span id="dm-trail" style="color:#eee">—</span></div>
      <div style="margin-bottom:4px">Próxima cidade correta: <strong id="dm-next" style="color:#22c55e">—</strong></div>
      <div>Cidade final: <strong id="dm-final" style="color:#ef4444">—</strong></div>
    </div>
  </div>
</div>

<div id="result-screen" class="screen" style="text-align:center">
  <div id="result-icon" style="font-size:64px"></div>
  <h1 id="result-title"></h1>
  <div class="card" id="result-details" style="margin:20px 0;text-align:left"></div>
  <button class="btn primary" style="width:100%" onclick="location.reload()">Nova Partida</button>
</div>

<div id="warrant-modal" class="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100; align-items:center; justify-content:center;">
  <div class="modal" style="background:#1e1e1e; padding:20px; border-radius:16px; width:90%; max-width:400px;">
    <h3>Emitir Mandado</h3>
    <div id="warrant-options" style="margin:15px 0;max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:8px"></div>
    <button class="btn" style="width:100%" onclick="closeWarrantModal()">Fechar</button>
  </div>
</div>

  apiKey: '', criminal: null, trail: [], playerPos: 0, currentCityId: '',
  currentDay: 1, maxDays: 4, currentMinutes: 8*60,
  venuesPerCity: {}, visitedVenues: {}, warrant: null, clues: [], usedCuriosities: {}, history: [],
  isRequesting: false 
};

function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function startGame() {
  G.criminal = rand(CRIMINALS);
  G.trail = [...CITIES].sort(() => Math.random() - 0.5).slice(0, 6);
  G.trail.forEach(city => { G.venuesPerCity[city.id] = [...VENUES].sort(() => Math.random() - 0.5).slice(0, 3); });
  G.currentCityId = G.trail[0].id;
  G.playerPos = 0; G.currentDay = 1; G.currentMinutes = 8*60;
  G.visitedVenues = {}; G.clues = []; G.usedCuriosities = {};
  G.currentCityId = G.trail[0].id;
  G.history = [G.currentCityId];
  document.getElementById('setup-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');
  renderGameScreen();
}

async function investigateVenue(cityId, venueId) {
  if (G.isRequesting) return;
  const key = `${cityId}_${venueId}`;
  if (G.visitedVenues[key]) return;

  G.isRequesting = true;
  try {
    if (!advanceTime(120)) return;

    const cityIdx = G.trail.findIndex(c => c.id === cityId);
    const venue = VENUES.find(v => v.id === venueId);
    const nextCity = G.trail[cityIdx + 1];

    G.visitedVenues[key] = "<span class='loading-pulse'>Consultando testemunhas...</span>";
    renderVenues();

    // Simulação de tempo de resposta para manter a imersão
    await new Promise(resolve => setTimeout(resolve, 800));

    if (cityIdx === G.trail.length - 1) {
      G.visitedVenues[key] = "O suspeito foi visto por aqui há poucos minutos!"; 
      if (Math.random() > 0.6) { foundCriminal(); return; }
    } else {
      if (!G.usedCuriosities[cityId]) G.usedCuriosities[cityId] = [];
      
      const temaCandidatos = venue.temas
        .map(t => ({ tema: t, info: nextCity.curiosidades[t] }))
        .filter(c => c.info && !G.usedCuriosities[cityId].includes(c.info));

      let fato;
      if (temaCandidatos.length > 0) {
        fato = rand(temaCandidatos);
      } else {
        const todosDisponiveis = Object.entries(nextCity.curiosidades)
          .filter(([tema, info]) => info !== null && !G.usedCuriosities[cityId].includes(info))
          .map(([tema, info]) => ({ tema, info }));
        
        fato = todosDisponiveis.length > 0 ? rand(todosDisponiveis) : { tema: "Geral", info: "Visto na região recentemente." };
      }
      
      G.usedCuriosities[cityId].push(fato.info);
      
      const incluirC = Math.random() < 0.4; // 40% de chance de vir pista física
      const text = generateLocalDialogue(venue, fato.info, incluirC);
      G.visitedVenues[key] = text;
      G.clues.push(`[${venue.name}] ${text}`);
    }
  } finally {
    G.isRequesting = false;
    renderGameScreen();
  }
}

function generateLocalDialogue(venue, fato, incluirC) {
  const introPistaFisica = incluirC ? ` Vi uma pessoa de cabelo ${G.criminal.aparencia.cabelo} que ` : " Um viajante ";
  
  const templates = {
    'Taverna': [
      `(O taverneiro limpa o balcão) ${introPistaFisica} esteve aqui e não parava de perguntar sobre ${fato}.`,
      `(O taverneiro aponta para uma mesa vazia) Aquele sujeito de quem você falou? Ele passou a noite pesquisando sobre ${fato}.`
    ],
    'Biblioteca': [
      `(O bibliotecário ajeita os óculos) ${introPistaFisica} requisitou pergaminhos raros que descreviam: "${fato}".`,
      `(O bibliotecário consulta um registro) Tivemos um visitante interessado na história de ${fato}.`
    ],
    'Caravanas': [
      `(O mestre de carga confere uma lista) ${introPistaFisica} comprou mantimentos para uma viagem, mencionando algo sobre ${fato}.`,
      `(O mestre de carga olha o horizonte) Alguém com essas características partiu após questionar sobre ${fato}.`
    ],
    'default': [
      `(O ${venue.cargo} olha para você) ${introPistaFisica} demonstrou um interesse incomum em: "${fato}".`,
      `(O ${venue.cargo} faz uma pausa) Me lembro de alguém perguntando sobre o relato de que ${fato}.`
    ]
  };

  const opcoes = templates[venue.id] || templates.default;
  return rand(opcoes);
}

function travelTo(cityId) {
  if (G.isRequesting) return;
  if (!advanceTime(TRAVELLING_TIME_COST * 60)) return;
  if (G.history.length > 1 && cityId === G.history[G.history.length - 2]) {
    G.history.pop();
  } else {
    G.history.push(cityId);
  }
  G.currentCityId = cityId;
  G.playerPos = G.trail.findIndex(c => c.id === cityId);
  if (!G.venuesPerCity[cityId]) {
    G.venuesPerCity[cityId] = [...VENUES].sort(() => Math.random() - 0.5).slice(0, 3);
  }
  renderGameScreen(); 
  switchTab('investigate', document.getElementById('tab-investigate'));
}

function renderGameScreen() {
  const city = G.trail[G.playerPos] || CITIES.find(c => c.id === G.currentCityId);
  document.getElementById('current-city-name').textContent = city.name;
  document.getElementById('time-display').textContent = `Dia ${G.currentDay} - ${Math.floor(G.currentMinutes/60)}:00`;
  document.getElementById('time-fill').style.width = `${(1 - (G.currentDay/G.maxDays)) * 100}%`;
  renderVenues(); renderTravel();
  if (G.criminal) {
    document.getElementById('dm-criminal').textContent = G.criminal.name;
    document.getElementById('dm-trail').textContent = G.trail.map(c => c.name).join(' → ');
    document.getElementById('dm-next').textContent = G.trail[G.playerPos + 1]?.name || "Final";
    document.getElementById('dm-final').textContent = G.trail[G.trail.length - 1].name;
  }
}

function renderVenues() {
  const id = G.currentCityId;
  const list = document.getElementById('venues-list');
  list.innerHTML = (G.venuesPerCity[id] || []).map(v => {
    const visited = G.visitedVenues[`${id}_${v.id}`];
    return `<div class="clue-item">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div onclick="${visited || G.isRequesting ? '' : `investigateVenue('${id}','${v.id}')`}" style="cursor:pointer; ${G.isRequesting && !visited ? 'opacity:0.5; cursor:wait;' : ''}">
          ${v.icon} <strong>${v.name}</strong>
        </div>
        ${visited && !visited.includes('pulse') ? '✅' : ''}
      </div>
      ${visited ? `<div class="npc-bubble">${visited}</div>` : ''}
    </div>`;
  }).join('');
}

function renderTravel() {
  const currentId = G.currentCityId;
  const instructionsEl = document.getElementById('travel-instructions');
  instructionsEl.innerHTML = `A viagem de teleporte demora <strong>${TRAVELLING_TIME_COST} horas</strong>.<br>Lembre-se que se for para o caminho errado, você poderá voltar para a cidade de onde partiu e retomar os rastros do suspeito.<br>Escolha a cidade para onde deseja se teleportar.`;
  const options = new Set();
  const trailIds = G.trail.map(c => c.id);

  if (G.history.length > 1) {
    options.add(G.history[G.history.length - 2]);
  }

  let nextCorrectId = null;
  if (G.playerPos !== -1 && G.playerPos < G.trail.length - 1) {
    nextCorrectId = G.trail[G.playerPos + 1].id;
    options.add(nextCorrectId);
  }

  const randomCandidates = CITIES.filter(c => 
    c.id !== currentId && 
    !trailIds.includes(c.id)
  ).map(c => c.id);

  const shuffledErrors = randomCandidates.sort(() => Math.random() - 0.5);

  for (let id of shuffledErrors) {
    if (options.size >= 5) break;
    options.add(id);
  }

  const finalOptions = Array.from(options).sort(() => Math.random() - 0.5);

  document.getElementById('travel-list').innerHTML = Array.from(options).map(id => {
    const city = CITIES.find(c => c.id === id);
    return `<div class="city-option" style="background:#252525; padding:10px; border-radius:8px; margin-bottom:8px; cursor:pointer;" onclick="travelTo('${city.id}')">🏙️ ${city.name}</div>`;
  }).join('');
}

function advanceTime(m) { 
  G.currentMinutes += m; 

  while (G.currentMinutes > 23 * 60) {
    const overflow = G.currentMinutes - (23 * 60);    
    G.currentDay++;    
    G.currentMinutes = (8 * 60) + overflow;
  }

  if (G.currentDay > G.maxDays) { 
    endGame('timeout'); 
    return false; 
  }
  return true;
}

function switchTab(t, el) {
  ['investigate','travel','notes'].forEach(p => document.getElementById('panel-'+p).style.display = p === t ? 'block' : 'none');
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  if (el) el.classList.add('active');
  if (t === 'notes') document.getElementById('clues-collected').innerHTML = G.clues.join('<br>') || "Sem pistas.";
}

function openWarrantModal() {
  document.getElementById('warrant-options').innerHTML = CRIMINALS.map(c => `<div class="city-option" style="padding:8px; background:#333; border-radius:4px; cursor:pointer" onclick="issueWarrant('${c.id}')">👤 ${c.name}</div>`).join('');
  document.getElementById('warrant-modal').style.display = 'flex';
}
function closeWarrantModal() { document.getElementById('warrant-modal').style.display = 'none'; }
function issueWarrant(id) { 
  G.warrant = id; 
  document.getElementById('warrant-display').textContent = CRIMINALS.find(c => c.id === id).name; 
  closeWarrantModal(); 
}
function foundCriminal() { if (G.warrant === G.criminal.id) endGame('won'); else endGame('wrong_warrant'); }

function endGame(r) {
  document.getElementById('game-screen').classList.remove('active');
  document.getElementById('result-screen').classList.add('active');
  document.getElementById('result-title').textContent = r === 'won' ? "Capturado!" : "Escapou!";
  document.getElementById('result-icon').textContent = r === 'won' ? "🏆" : "💀";
}
</script>
</body>
